# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TESTCONTAINER_DOCKER_NETWORK: nestled-testcontainers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3          

      - name: Tidy
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Create Docker network for testcontainers
        run: docker network create ${{ env.TESTCONTAINER_DOCKER_NETWORK }}

      - name: Test
        run: go test ./...

      - name: Build docker image
        run: |
         docker build -t nestled-api .
         docker build -t nestled-migrations -f migrations/Dockerfile .